<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL DE TAREAS MANTENIMIENTO - LATAM</title>
    <style>
        :root {
            --primary: #2F3E46; 
            --accent: #38B2AC; 
            --bg: #ffffff;
            --light-gray: #f4f5f7;
            --border: #cbd5e0; /* Un poco más definido */
            --leader-color: #d69e2e;
            --danger: #e53e3e;
            --help: #dd6b20; 
            --comment: #718096;
        }

        body, input, select, button, textarea {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-transform: uppercase;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Barra superior general */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background-color: var(--light-gray);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .btn-top {
            width: 150px;
            height: 36px;
            font-size: 12px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Lógica de visibilidad Leader */
        .leader-wrapper { display: contents; } 
        body:not(.team-leader-mode) .leader-only {
            display: none !important;
        }

        /* ==========================================
           PANEL DE CONTROL TEAM LEADER
           ========================================== */
        .header-controls {
            background-color: #fffaf0;
            border: 1px solid #fbd38d;
            border-left: 6px solid var(--leader-color);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .leader-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #fbd38d;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .leader-title {
            font-size: 1.1em;
            font-weight: 800;
            color: var(--leader-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leader-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

        input, select, button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        
        input:focus, select:focus { border-color: var(--accent); }

        input { flex: 1; min-width: 140px; }
        input[type="time"] { min-width: auto; width: 100px; }
        
        button {
            background-color: var(--primary);
            color: white; border: none; cursor: pointer;
            font-weight: 600; transition: all 0.2s;
        }

        button:hover { opacity: 0.9; }
        .btn-accent { background-color: var(--accent); }
        .btn-leader { background-color: var(--leader-color); color: #fff; }
        .btn-clear { background-color: var(--danger); color: white; }
        .btn-outline { background-color: transparent; border: 1px solid var(--comment); color: var(--comment); }
        .btn-outline:hover { background-color: var(--comment); color: white; }
        
        .btn-danger-outline { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger-outline:hover { background: var(--danger); color: white; }

        /* Etiquetas de técnicos */
        .tech-pill {
            background-color: var(--primary);
            color: white; padding: 6px 12px;
            border-radius: 15px; font-size: 11px;
            display: flex; align-items: center; gap: 8px; font-weight: bold;
        }
        .tech-pill span { cursor: pointer; color: #fc8181; font-size: 14px; line-height: 1; transition: 0.2s;}
        .tech-pill span:hover { color: #fff; }

        .document-header { font-size: 1.4em; font-weight: 800; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .avion-section { margin-bottom: 30px; }

        .avion-title {
            font-size: 1.2em; font-weight: bold; margin-bottom: 15px;
            display: flex; align-items: flex-start; background: #f8fafc;
            padding: 12px; border-radius: 4px; flex-wrap: wrap; gap: 15px;
            border-left: 4px solid var(--primary); border: 1px solid var(--border); border-left-width: 4px;
        }

        .avion-info-main { flex: 1; min-width: 250px; }
        .avion-pos { color: var(--primary); background: #edf2f7; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; margin-left: 8px;}
        .avion-times { color: #4a5568; font-size: 0.85em; display: inline-block; margin-left: 8px; background: #e2e8f0; padding: 2px 6px; border-radius: 3px; }
        .avion-comment { font-size: 0.85em; color: var(--comment); margin-top: 6px; font-weight: normal; font-style: italic; }

        .tango-link { color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: bold; padding: 2px 4px; border-radius: 3px; transition: background 0.2s; }
        .tango-link:hover { background-color: rgba(56, 178, 172, 0.1); }

        .task-item {
            display: flex; margin-bottom: 10px; padding: 12px;
            align-items: flex-start; border-radius: 6px; transition: all 0.3s ease;
            border: 1px solid var(--border); background-color: #ffffff;
        }

        /* Modos Urgente / Ayuda */
        @keyframes pulseDanger { 
            0% { border-left-color: #fc8181; box-shadow: inset 4px 0 0 transparent; } 
            50% { border-left-color: var(--danger); box-shadow: inset 6px 0 15px rgba(229,62,62,0.15); } 
            100% { border-left-color: #fc8181; box-shadow: inset 4px 0 0 transparent; } 
        }
        @keyframes pulseHelp { 
            0% { border-left-color: #fbd38d; box-shadow: inset 4px 0 0 transparent; } 
            50% { border-left-color: var(--help); box-shadow: inset 6px 0 15px rgba(221,107,32,0.15); } 
            100% { border-left-color: #fbd38d; box-shadow: inset 4px 0 0 transparent; } 
        }
        @keyframes pulseBoth { 
            0% { border-left-color: var(--danger); box-shadow: inset 4px 0 0 transparent; } 
            50% { border-left-color: var(--help); box-shadow: inset 6px 0 15px rgba(221,107,32,0.15); } 
            100% { border-left-color: var(--danger); box-shadow: inset 4px 0 0 transparent; } 
        }

        .task-item.priority { border-left: 4px solid var(--danger); background-color: #fffafb; animation: pulseDanger 1.8s infinite ease-in-out; }
        .task-item.help-needed { border-left: 4px solid var(--help); background-color: #fffdfa; animation: pulseHelp 1.8s infinite ease-in-out; }
        .task-item.priority.help-needed { border-left: 4px solid var(--danger); background: linear-gradient(90deg, #fffafb 0%, #fffdfa 100%); animation: pulseBoth 1.8s infinite ease-in-out; }

        .priority-badge { color: var(--danger); font-weight: 800; font-size: 0.85em; margin-left: 8px; }
        .help-badge { color: var(--help); font-weight: 800; font-size: 0.85em; margin-left: 8px; }

        .status-toggle {
            width: 24px; height: 24px; min-width: 24px; min-height: 24px;
            box-sizing: border-box; border: 2px solid var(--primary);
            background-color: white; margin-right: 15px; margin-top: 2px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: transparent; font-size: 16px; transition: all 0.2s; user-select: none; border-radius: 4px;
        }

        .task-item.completed .status-toggle { background-color: var(--accent); border-color: var(--accent); color: white; }
        .task-item.completed { animation: none !important; border-left: 1px solid var(--border) !important; background-color: #f8fafc !important; box-shadow: none !important; opacity: 0.8;}
        .task-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .task-info { width: 100%; transition: all 0.3s ease; }
        .task-item.completed .task-info { text-decoration: line-through; color: var(--comment); }
        .task-item.completed .tango-link { text-decoration: line-through; color: var(--comment); }

        .task-desc { font-weight: 500; font-size: 1.05em; line-height: 1.4; }
        .task-techs { font-size: 0.85em; font-weight: 700; color: #4a5568; margin-top: 6px; }
        .task-comment { font-size: 0.85em; color: var(--comment); margin-top: 6px; font-style: italic; font-weight: 600; }

        /* Botoneras */
        .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: stretch; justify-content: flex-end; }
        .action-bar.avion-bar { margin-top: 0; }

        .action-btn {
            flex: 1; min-width: 90px; max-width: 130px;
            padding: 6px 8px; font-size: 11px; font-weight: 700;
            border-radius: 4px; border: 1px solid var(--border);
            background: #ffffff; color: var(--primary);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }

        .action-btn:hover { background: var(--light-gray); border-color: #a0aec0; }
        .action-btn.active-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .action-btn.active-help { background: var(--help); color: white; border-color: var(--help); }
        .btn-highlight { color: var(--accent); border-color: var(--accent); background-color: #f0fbfb; }
        .btn-highlight:hover { background-color: var(--accent); color: white; }

        /* ==========================================
           MODALS (VENTANAS FLOTANTES)
           ========================================== */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(47, 62, 70, 0.7); backdrop-filter: blur(3px);
        }
        
        .modal-content {
            background-color: var(--bg); margin: 5% auto; padding: 25px;
            border: 1px solid var(--border); width: 90%; max-width: 500px; border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .modal-header { 
            font-weight: 800; font-size: 1.2em; margin-bottom: 20px; 
            color: var(--primary); border-bottom: 2px solid var(--leader-color); padding-bottom: 10px;
        }
        
        .modal-content input, .modal-content select { width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .modal-row { display: flex; gap: 12px; }
        .modal-row > * { flex: 1; }

        /* Cuadrícula Táctica para Asignar Técnicos */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px; max-height: 160px; overflow-y: auto;
            margin-bottom: 20px; padding: 2px;
        }

        .tech-checkbox-label {
            display: flex; align-items: center; gap: 8px;
            background: #f8fafc; border: 1px solid var(--border); padding: 8px 10px;
            border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 700;
            transition: all 0.2s; user-select: none; color: var(--comment);
        }

        .tech-checkbox-label:hover { border-color: var(--accent); color: var(--primary); }
        .tech-checkbox-label:has(input:checked) { border-color: var(--accent); background: #f0fbfb; color: var(--accent); }
        .tech-checkbox-label input { margin: 0; width: auto; cursor: pointer; }

        /* Pie del Modal */
        .modal-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 10px; padding-top: 20px; border-top: 1px solid var(--border);
        }
        
        .modal-actions-right { display: flex; gap: 10px; }

        @media print {
            @page { size: letter; margin: 1cm; }
            .no-print { display: none !important; }
            body { padding: 0; background-color: white; font-size: 11px; }
            .document-header { font-size: 1.2em; margin-bottom: 15px; padding-bottom: 5px; }
            .avion-section { margin-bottom: 20px; }
            .avion-title { font-size: 1.1em; margin-bottom: 8px; padding: 6px; flex-direction: column; align-items: flex-start; border-left: 2px solid var(--primary); border:none; border-left: 2px solid var(--primary); }
            .avion-pos, .avion-times { padding: 0; background: none; border-radius: 0; }
            .task-item { margin-bottom: 6px; padding: 0px 5px; border: none; animation: none !important; background: none !important; box-shadow: none !important; }
            .task-item.completed .task-info { opacity: 0.85 !important; text-decoration: line-through; color: #333; }
            .task-item.completed .status-toggle { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: var(--accent) !important; border-color: var(--accent) !important; color: white !important; }
            .tango-link { text-decoration: none; color: black; }
            .status-toggle { margin-top: 0px; width: 16px; min-width: 16px; height: 16px; min-height: 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar no-print">
        <button id="btn-mode-toggle" class="btn-accent btn-top" onclick="toggleMode()">MODO TÉCNICO</button>
        <button class="btn-top" onclick="window.print()" style="background-color: #718096; color:white; border:none;">🖨️ IMPRIMIR HOJA</button>
    </div>

    <!-- CONFIGURACIÓN DE TURNO (TEAM LEADER) -->
    <div class="header-controls leader-only no-print">
        <div class="leader-panel-header">
            <div class="leader-title">⚙️ PANEL DE CONTROL TEAM LEADER</div>
            <button class="btn-danger-outline" onclick="clearAllData()" style="padding: 6px 12px; font-size: 11px;">⚠️ BORRAR HOJA ENTERA</button>
        </div>

        <div class="leader-grid">
            <div class="control-group">
                <span style="font-size: 11px; font-weight: bold; color: var(--comment); width: 60px;">TURNO:</span>
                <select id="in-turno" onchange="updateHeader()" style="max-width: 140px;">
                    <option value="Turno Día">DÍA</option>
                    <option value="Turno Tarde">TARDE</option>
                    <option value="Turno Noche">NOCHE</option>
                </select>
                <input type="date" id="in-fecha" onchange="updateHeader()" style="max-width: 140px;">
                <input type="text" id="in-jefe" placeholder="NOMBRE JEFE DE TURNO" oninput="updateHeader()">
            </div>
            
            <div class="control-group">
                <span style="font-size: 11px; font-weight: bold; color: var(--comment); width: 60px;">TÉCNICOS:</span>
                <input type="text" id="in-new-tech" placeholder="AGREGAR APELLIDO (EJ: ROJAS)" onkeypress="if(event.key === 'Enter') addTech()" style="max-width: 290px;">
                <button class="btn-leader" onclick="addTech()">+ AGREGAR A LA LISTA</button>
            </div>

            <div class="control-group" id="tech-pills-container" style="gap: 8px; margin-left: 70px;"></div>
        </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div id="print-area">
        <div class="document-header" id="display-header"></div>
        <div id="aviones-container"></div>
        <div class="leader-only no-print" style="margin-top: 20px;">
            <button class="btn-leader" onclick="openAddAvionModal()" style="width: 100%; padding: 14px; font-size: 14px;">+ AGREGAR NUEVO AVIÓN A LA HOJA</button>
        </div>
    </div>
</div>

<!-- ================= MODALS (VENTANAS FLOTANTES) ================= -->

<!-- Modal Agregar Avión -->
<div id="add-avion-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">✈️ AGREGAR NUEVO AVIÓN</div>
        <input type="text" id="add-ac-reg" placeholder="MATRÍCULA (EJ: CC-BGM)" maxlength="6" oninput="formatMatricula(this)">
        <div class="modal-row">
            <input type="text" id="add-ac-wp" placeholder="WP (T00...)" maxlength="8">
            <input type="text" id="add-ac-pos" placeholder="POSICIÓN">
        </div>
        <div class="modal-row">
            <input type="time" id="add-ac-start" title="Inicio">
            <input type="time" id="add-ac-end" title="Término">
        </div>
        <input type="text" id="add-ac-comment" placeholder="NOTA DEL AVIÓN (OPCIONAL)">
        
        <div class="modal-footer">
            <div></div> <!-- Spacer -->
            <div class="modal-actions-right">
                <button class="btn-outline" onclick="closeModal('add-avion-modal')">CANCELAR</button>
                <button class="btn-leader" onclick="saveAddAvion()">GUARDAR AVIÓN</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar Avión -->
<div id="edit-avion-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ EDITAR AVIÓN</div>
        <input type="text" id="edit-ac-reg" placeholder="MATRÍCULA" maxlength="6" oninput="formatMatricula(this)">
        <div class="modal-row">
            <input type="text" id="edit-ac-wp" placeholder="WP (T00...)" maxlength="8">
            <input type="text" id="edit-ac-pos" placeholder="POSICIÓN">
        </div>
        <div class="modal-row">
            <input type="time" id="edit-ac-start" title="Inicio">
            <input type="time" id="edit-ac-end" title="Término">
        </div>
        <input type="text" id="edit-ac-comment" placeholder="NOTA DEL AVIÓN (OPCIONAL)">
        
        <div class="modal-footer">
            <button class="btn-danger-outline" onclick="confirmDeleteAvion()">ELIMINAR AVIÓN</button>
            <div class="modal-actions-right">
                <button class="btn-outline" onclick="closeModal('edit-avion-modal')">CANCELAR</button>
                <button class="btn-leader" onclick="saveEditAvion()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Agregar Tarea -->
<div id="add-task-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">📝 AGREGAR TAREA</div>
        <input type="text" id="add-task-desc" placeholder="DESCRIPCIÓN DE LA TAREA" oninput="detectTangoModal(this, 'add-task-tango')">
        <input type="text" id="add-task-tango" placeholder="TANGO (8 CARACT.)" maxlength="8">
        
        <div style="font-size: 11px; font-weight: bold; color: var(--comment); margin-bottom: 8px;">ASIGNAR TÉCNICOS:</div>
        <div class="tech-grid" id="add-task-techs"></div>
        
        <div class="modal-footer">
            <div></div> <!-- Spacer -->
            <div class="modal-actions-right">
                <button class="btn-outline" onclick="closeModal('add-task-modal')">CANCELAR</button>
                <button class="btn-leader" onclick="saveAddTask()">GUARDAR TAREA</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar Tarea -->
<div id="edit-task-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ EDITAR TAREA</div>
        <input type="text" id="edit-task-desc" placeholder="DESCRIPCIÓN DE LA TAREA" oninput="detectTangoModal(this, 'edit-task-tango')">
        <input type="text" id="edit-task-tango" placeholder="TANGO (8 CARACT.)" maxlength="8">
        
        <div style="font-size: 11px; font-weight: bold; color: var(--comment); margin-bottom: 8px;">TÉCNICOS ASIGNADOS:</div>
        <div class="tech-grid" id="edit-task-techs"></div>
        
        <div class="modal-footer">
            <button class="btn-danger-outline" onclick="confirmDeleteTask()">ELIMINAR TAREA</button>
            <div class="modal-actions-right">
                <button class="btn-outline" onclick="closeModal('edit-task-modal')">CANCELAR</button>
                <button class="btn-leader" onclick="saveEditTask()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>
</div>

<script>
    let avionesData = [];
    let shiftTechs = []; 
    let isTeamLeader = false;
    let editCurrentAvionId = null;
    let editCurrentTaskId = null;
    const MAINTENIX_URL = "https://maintenix.lan.com/maintenix/common/ToDoList.jsp";
    
    const STORAGE_KEY = 'latam_line_maintenance_data';
    const KEY_TURNO = 'latam_header_turno';
    const KEY_FECHA = 'latam_header_fecha';
    const KEY_JEFE = 'latam_header_jefe';
    const KEY_TECHS = 'latam_shift_techs';

    loadData();
    updateHeader();

    // ==========================================
    // LÓGICA GENERAL Y TÉCNICOS
    // ==========================================
    function addTech() {
        const input = document.getElementById('in-new-tech');
        const name = input.value.trim().toUpperCase();
        if (!name) return;
        if (shiftTechs.includes(name)) return alert("ESTE TÉCNICO YA ESTÁ EN LA LISTA.");

        shiftTechs.push(name);
        shiftTechs.sort(); 
        input.value = '';
        saveTechs(); renderTechPills();
    }

    function removeTech(index) {
        if (!confirm(`¿CONFIRMAS ELIMINAR A ${shiftTechs[index]} DE LA LISTA DE TÉCNICOS PRESENTES?`)) return;
        shiftTechs.splice(index, 1);
        saveTechs(); renderTechPills();
    }

    function saveTechs() { localStorage.setItem(KEY_TECHS, JSON.stringify(shiftTechs)); }

    function renderTechPills() {
        const container = document.getElementById('tech-pills-container');
        container.innerHTML = '';
        shiftTechs.forEach((tech, index) => {
            const pill = document.createElement('div');
            pill.className = 'tech-pill';
            pill.innerHTML = `${tech} <span onclick="removeTech(${index})" title="Eliminar Técnico">✖</span>`;
            container.appendChild(pill);
        });
    }

    function toggleMode() {
        isTeamLeader = !isTeamLeader;
        const body = document.body;
        const btnToggle = document.getElementById('btn-mode-toggle');

        if (isTeamLeader) {
            body.classList.add('team-leader-mode');
            btnToggle.innerText = "MODO TEAM LEADER";
            btnToggle.style.backgroundColor = "var(--leader-color)";
        } else {
            body.classList.remove('team-leader-mode');
            btnToggle.innerText = "MODO TÉCNICO";
            btnToggle.style.backgroundColor = "var(--accent)";
        }
        render(); 
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(avionesData)); }

    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) avionesData = JSON.parse(saved);

        const savedTurno = localStorage.getItem(KEY_TURNO);
        if (savedTurno) document.getElementById('in-turno').value = savedTurno;

        const savedFecha = localStorage.getItem(KEY_FECHA);
        if (savedFecha) document.getElementById('in-fecha').value = savedFecha;
        else document.getElementById('in-fecha').valueAsDate = new Date();

        const savedJefe = localStorage.getItem(KEY_JEFE);
        if (savedJefe) document.getElementById('in-jefe').value = savedJefe;

        const savedTechs = localStorage.getItem(KEY_TECHS);
        if (savedTechs) shiftTechs = JSON.parse(savedTechs);

        render();
        renderTechPills();
    }

    function clearAllData() {
        if(confirm("⚠️ ¿ESTÁS SEGURO DE QUE QUIERES BORRAR TODA LA HOJA DE TURNO? (Los técnicos agregados no se borrarán)")) {
            avionesData = [];
            saveData(); render();
        }
    }

    function updateHeader() {
        const turno = document.getElementById('in-turno').value.toUpperCase();
        const fechaRaw = document.getElementById('in-fecha').value;
        const jefe = document.getElementById('in-jefe').value.toUpperCase();
        
        localStorage.setItem(KEY_TURNO, turno);
        localStorage.setItem(KEY_FECHA, fechaRaw);
        localStorage.setItem(KEY_JEFE, jefe);

        const fecha = new Date(fechaRaw + 'T00:00:00').toLocaleDateString('es-ES', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        }).toUpperCase();

        document.getElementById('display-header').innerText = `${turno} ${fecha} ${jefe ? '- ' + jefe : ''}`;
    }

    // ==========================================
    // UTILS & RENDER
    // ==========================================
    function formatMatricula(input) {
        let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); 
        if (val.length > 2) input.value = val.substring(0, 2) + '-' + val.substring(2, 5);
        else input.value = val;
    }

    function detectTangoModal(input, targetId) {
        const text = input.value.toUpperCase();
        const regex = /\bT00[A-Z0-9]{5}\b/g; 
        const matches = text.match(regex);
        if (matches && matches.length > 0) {
            document.getElementById(targetId).value = matches[matches.length - 1];
        }
    }

    async function handleTangoClick(tangoCode) {
        try { await navigator.clipboard.writeText(tangoCode); window.open(MAINTENIX_URL, '_blank'); } 
        catch (err) { console.error('ERROR AL COPIAR:', err); }
    }

    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

    function render() {
        const container = document.getElementById('aviones-container');
        container.innerHTML = '';

        avionesData.forEach(avion => {
            const div = document.createElement('div');
            div.className = 'avion-section';
            
            const wpDisplay = avion.wp ? `<span class="tango-link" onclick="handleTangoClick('${avion.wp}')">(${avion.wp})</span>` : '';
            const posDisplay = avion.pos ? `<span class="avion-pos">POSICIÓN: ${avion.pos}</span>` : '';
            const timesDisplay = (avion.start || avion.end) ? `<span class="avion-times">🕒 ${avion.start || '--:--'} - ${avion.end || '--:--'}</span>` : '';
            
            let html = `
                <div class="avion-title">
                    <div class="avion-info-main">
                        • ${avion.reg} ${wpDisplay} ${posDisplay} ${timesDisplay}
                        ${avion.comment ? `<div class="avion-comment">↳ NOTA AVIÓN: ${avion.comment}</div>` : ''}
                    </div>
                    <div class="action-bar avion-bar no-print">
                        <button class="action-btn" onclick="editAvionComment(${avion.id})">💬 NOTA</button>
                        <div class="leader-only leader-wrapper">
                            <button class="action-btn btn-highlight" onclick="openAddTaskModal(${avion.id})">➕ TAREA</button>
                            <button class="action-btn" onclick="openEditAvionModal(${avion.id})">✏️ EDITAR</button>
                        </div>
                    </div>
                </div>
            `;

            avion.tareas.forEach(t => {
                let cleanDesc = t.desc; let tangoDisplay = '';

                if (t.tango) {
                    const regexClean = new RegExp(`\\[?${t.tango}\\]?`, 'gi');
                    cleanDesc = cleanDesc.replace(regexClean, '').trim().replace(/[- ]+$/, '').trim();
                    tangoDisplay = ` [<span class="tango-link" onclick="handleTangoClick('${t.tango}')">${t.tango}</span>]`;
                }

                const priorityLabel = t.priority ? '<span class="priority-badge">🔥 URGENTE</span>' : '';
                const helpLabel = t.help ? '<span class="help-badge">🆘 APOYO SOLICITADO</span>' : '';

                html += `
                    <div class="task-item ${t.done ? 'completed' : ''} ${t.priority ? 'priority' : ''} ${t.help ? 'help-needed' : ''}">
                        <div class="status-toggle no-print" onclick="toggleTask(${avion.id}, ${t.id})">✓</div>
                        <div class="task-main">
                            <div class="task-info">
                                <div class="task-desc">- ${cleanDesc} ${tangoDisplay} ${priorityLabel} ${helpLabel}</div>
                                ${t.techs ? `<div class="task-techs">${t.techs}</div>` : ''}
                                ${t.comment ? `<div class="task-comment">↳ NOTA: ${t.comment}</div>` : ''}
                            </div>
                            <div class="action-bar no-print">
                                <div class="leader-only leader-wrapper">
                                    <button class="action-btn ${t.priority ? 'active-danger' : ''}" onclick="togglePriority(${avion.id}, ${t.id})">🔥 URGENTE</button>
                                </div>
                                <button class="action-btn ${t.help ? 'active-help' : ''}" onclick="toggleHelp(${avion.id}, ${t.id})">🆘 APOYO</button>
                                <button class="action-btn" onclick="editTaskComment(${avion.id}, ${t.id})">💬 NOTA</button>
                                <div class="leader-only leader-wrapper">
                                    <button class="action-btn" onclick="openEditTaskModal(${avion.id}, ${t.id})">✏️ EDITAR</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            div.innerHTML = html;
            container.appendChild(div);
        });
    }

    // ==========================================
    // CONTROLES DE ESTADO (DONE, PRIORITY, HELP)
    // ==========================================
    function toggleTask(aId, tId) {
        const avion = avionesData.find(a => a.id == aId);
        const tarea = avion.tareas.find(t => t.id == tId);
        if (!tarea.done) {
            if (!confirm("¿CONFIRMAS QUE ESTA TAREA ESTÁ COMPLETADA Y CERRADA?")) return;
            tarea.help = false; 
            tarea.priority = false; // Desactiva urgente al terminar
        } else {
            if (!confirm("¿CONFIRMAS QUE DESEAS REABRIR ESTA TAREA?")) return;
        }
        tarea.done = !tarea.done; saveData(); render(); 
    }

    function togglePriority(aId, tId) {
        const avion = avionesData.find(a => a.id == aId);
        const tarea = avion.tareas.find(t => t.id == tId);
        if (tarea.done) return alert("LA TAREA ESTÁ COMPLETADA.");
        const accion = tarea.priority ? "DESACTIVAR" : "ACTIVAR";
        if (!confirm(`¿CONFIRMAS QUE DESEAS ${accion} EL ESTADO URGENTE DE ESTA TAREA?`)) return;
        tarea.priority = !tarea.priority; saveData(); render();
    }

    function toggleHelp(aId, tId) {
        const avion = avionesData.find(a => a.id == aId);
        const tarea = avion.tareas.find(t => t.id == tId);
        if (tarea.done) return alert("LA TAREA ESTÁ COMPLETADA.");
        const accion = tarea.help ? "DESACTIVAR" : "ACTIVAR";
        if (!confirm(`¿CONFIRMAS QUE DESEAS ${accion} LA SOLICITUD DE APOYO?`)) return;
        tarea.help = !tarea.help; saveData(); render();
    }

    // ==========================================
    // FUNCIONES MODAL: AVIÓN
    // ==========================================
    function openAddAvionModal() {
        document.getElementById('add-ac-reg').value = '';
        document.getElementById('add-ac-wp').value = '';
        document.getElementById('add-ac-pos').value = '';
        document.getElementById('add-ac-start').value = '';
        document.getElementById('add-ac-end').value = '';
        document.getElementById('add-ac-comment').value = '';
        document.getElementById('add-avion-modal').style.display = 'block';
    }

    function saveAddAvion() {
        const reg = document.getElementById('add-ac-reg').value.toUpperCase().trim();
        let wp = document.getElementById('add-ac-wp').value.toUpperCase().trim();
        const pos = document.getElementById('add-ac-pos').value.toUpperCase().trim();
        const start = document.getElementById('add-ac-start').value;
        const end = document.getElementById('add-ac-end').value;
        const comment = document.getElementById('add-ac-comment').value.toUpperCase().trim();
        
        if (!reg || reg.length !== 6) return alert("LA MATRÍCULA DEBE ESTAR COMPLETA (EJ: CC-BGM)");
        if (wp.length === 5 && !wp.startsWith('T00')) wp = 'T00' + wp;
        if (wp && wp.length !== 8) return alert("EL WP DEBE TENER EXACTAMENTE 8 CARACTERES (EJ: T00RWT2F).");

        avionesData.push({ id: Date.now(), reg, wp, pos, start, end, comment, tareas: [] });
        saveData(); render(); closeModal('add-avion-modal');
    }

    function openEditAvionModal(id) {
        const avion = avionesData.find(a => a.id == id);
        if (!avion) return;
        editCurrentAvionId = id;

        document.getElementById('edit-ac-reg').value = avion.reg;
        document.getElementById('edit-ac-wp').value = avion.wp || '';
        document.getElementById('edit-ac-pos').value = avion.pos || '';
        document.getElementById('edit-ac-start').value = avion.start || '';
        document.getElementById('edit-ac-end').value = avion.end || '';
        document.getElementById('edit-ac-comment').value = avion.comment || '';
        
        document.getElementById('edit-avion-modal').style.display = 'block';
    }

    function saveEditAvion() {
        const avion = avionesData.find(a => a.id == editCurrentAvionId);
        const reg = document.getElementById('edit-ac-reg').value.toUpperCase().trim();
        let wp = document.getElementById('edit-ac-wp').value.toUpperCase().trim();
        
        if (!reg || reg.length !== 6) return alert("LA MATRÍCULA DEBE ESTAR COMPLETA (EJ: CC-BGM)");
        if (wp.length === 5 && !wp.startsWith('T00')) wp = 'T00' + wp;
        if (wp && wp.length !== 8) return alert("EL WP DEBE TENER EXACTAMENTE 8 CARACTERES.");

        avion.reg = reg; avion.wp = wp;
        avion.pos = document.getElementById('edit-ac-pos').value.toUpperCase().trim();
        avion.start = document.getElementById('edit-ac-start').value;
        avion.end = document.getElementById('edit-ac-end').value;
        avion.comment = document.getElementById('edit-ac-comment').value.toUpperCase().trim();

        saveData(); render(); closeModal('edit-avion-modal');
    }

    function confirmDeleteAvion() {
        if (confirm("⚠️ ¿CONFIRMAS BORRAR ESTE AVIÓN Y TODAS SUS TAREAS ASIGNADAS?")) {
            avionesData = avionesData.filter(a => a.id != editCurrentAvionId);
            saveData(); render(); closeModal('edit-avion-modal');
        }
    }

    // ==========================================
    // FUNCIONES MODAL: TAREAS (CON GRID DE TÉCNICOS)
    // ==========================================
    function buildTechGrid(containerId, selectedTechsString = "") {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        const currentTechs = selectedTechsString ? selectedTechsString.split(' - ') : [];
        
        if (shiftTechs.length === 0) {
            container.innerHTML = '<div style="font-size:12px; color:var(--comment); padding:10px;">NO HAY TÉCNICOS AGREGADOS AL TURNO</div>';
        } else {
            shiftTechs.forEach(tech => {
                const isChecked = currentTechs.includes(tech) ? "checked" : "";
                container.innerHTML += `
                    <label class="tech-checkbox-label">
                        <input type="checkbox" class="${containerId}-cb" value="${tech}" ${isChecked}>
                        <span>${tech}</span>
                    </label>
                `;
            });
        }
    }

    function openAddTaskModal(avionId) {
        editCurrentAvionId = avionId;
        document.getElementById('add-task-desc').value = '';
        document.getElementById('add-task-tango').value = '';
        buildTechGrid('add-task-techs', "");
        document.getElementById('add-task-modal').style.display = 'block';
    }

    function saveAddTask() {
        const avion = avionesData.find(a => a.id == editCurrentAvionId);
        const desc = document.getElementById('add-task-desc').value.trim().toUpperCase();
        let tango = document.getElementById('add-task-tango').value.trim().toUpperCase();
        
        if (!desc) return alert("INGRESE LA DESCRIPCIÓN DE LA TAREA.");
        if (tango.length === 5 && !tango.startsWith('T00')) tango = 'T00' + tango;
        if (tango && tango.length !== 8) return alert("EL TANGO DEBE TENER EXACTAMENTE 8 CARACTERES.");

        const checkboxes = document.querySelectorAll('.add-task-techs-cb:checked');
        const techs = Array.from(checkboxes).map(cb => cb.value).join(' - ');

        avion.tareas.push({ id: Date.now(), desc, tango, techs, done: false, priority: false, help: false, comment: "" });
        saveData(); render(); closeModal('add-task-modal');
    }

    function openEditTaskModal(aId, tId) {
        const avion = avionesData.find(a => a.id == aId);
        const tarea = avion.tareas.find(t => t.id == tId);
        editCurrentAvionId = aId;
        editCurrentTaskId = tId;

        document.getElementById('edit-task-desc').value = tarea.desc;
        document.getElementById('edit-task-tango').value = tarea.tango || "";
        buildTechGrid('edit-task-techs', tarea.techs || "");
        
        document.getElementById('edit-task-modal').style.display = 'block';
    }

    function saveEditTask() {
        const avion = avionesData.find(a => a.id == editCurrentAvionId);
        const tarea = avion.tareas.find(t => t.id == editCurrentTaskId);
        
        const desc = document.getElementById('edit-task-desc').value.trim().toUpperCase();
        let tango = document.getElementById('edit-task-tango').value.trim().toUpperCase();
        
        if (!desc) return alert("LA DESCRIPCIÓN NO PUEDE ESTAR VACÍA.");
        if (tango && tango.length !== 8) return alert("EL TANGO DEBE TENER EXACTAMENTE 8 CARACTERES.");
        if (tango && !tango.startsWith('T00')) return alert("EL TANGO DEBE EMPEZAR CON 'T00'.");

        const checkboxes = document.querySelectorAll('.edit-task-techs-cb:checked');
        const techs = Array.from(checkboxes).map(cb => cb.value).join(' - ');

        tarea.desc = desc; tarea.tango = tango; tarea.techs = techs;
        saveData(); render(); closeModal('edit-task-modal');
    }

    function confirmDeleteTask() {
        if (confirm("⚠️ ¿CONFIRMAS BORRAR ESTA TAREA?")) {
            const avion = avionesData.find(a => a.id == editCurrentAvionId);
            avion.tareas = avion.tareas.filter(t => t.id != editCurrentTaskId);
            saveData(); render(); closeModal('edit-task-modal');
        }
    }

    // ==========================================
    // NOTAS RÁPIDAS
    // ==========================================
    function editAvionComment(id) {
        const avion = avionesData.find(a => a.id == id);
        const newComment = prompt("INGRESAR/EDITAR NOTA DEL AVIÓN (DEJA EN BLANCO PARA BORRAR):", avion.comment || "");
        if (newComment !== null) { avion.comment = newComment.trim().toUpperCase(); saveData(); render(); }
    }

    function editTaskComment(aId, tId) {
        const avion = avionesData.find(a => a.id == aId);
        const tarea = avion.tareas.find(t => t.id == tId);
        const newComment = prompt("INGRESAR/EDITAR NOTA (DEJA EN BLANCO PARA BORRAR):", tarea.comment || "");
        if (newComment !== null) { tarea.comment = newComment.trim().toUpperCase(); saveData(); render(); }
    }
</script>
