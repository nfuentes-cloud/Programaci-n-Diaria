<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas - Mantenimiento en Línea</title>
    <style>
        :root {
            --primary: #2F3E46; 
            --accent: #38B2AC; 
            --bg: #ffffff;
            --light-gray: #f4f5f7;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Controles (No se imprimen) */
        .controls-panel {
            background-color: var(--light-gray);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .control-group:last-child {
            margin-bottom: 0;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        input, select, button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        input {
            flex: 1;
            min-width: 150px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1a2429;
        }

        .btn-accent {
            background-color: var(--accent);
        }

        .btn-accent:hover {
            background-color: #2c8c87;
        }

        /* Área de Impresión / Visualización */
        .document-header {
            margin-bottom: 30px;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .avion-section {
            margin-bottom: 30px;
        }

        .avion-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .avion-title span {
            margin-right: 8px;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .task-checkbox-container {
            margin-right: 10px;
            margin-top: 2px;
        }

        /* Checkbox personalizado */
        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            background-color: white;
            transition: all 0.2s;
        }

        .task-checkbox:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .task-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 16px;
            font-weight: bold;
            left: 4px;
            top: -1px;
        }

        .task-content {
            flex: 1;
        }

        .task-desc {
            font-weight: 500;
        }

        .task-assignees {
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .delete-btn {
            background-color: transparent;
            color: #e53e3e;
            border: 1px solid #e53e3e;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background-color: #e53e3e;
            color: white;
        }

        /* Ocultar elementos al imprimir */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                padding: 0;
            }
            .avion-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls-panel no-print">
            <div class="control-group">
                <input type="text" id="in-turno" placeholder="Turno (Ej: Turno Tarde)" value="Turno Tarde">
                <input type="date" id="in-fecha">
                <input type="text" id="in-jefe" placeholder="Nombre Jefe de Turno">
                <button onclick="updateHeader()">Actualizar Encabezado</button>
            </div>

            <div class="control-group">
                <strong>Avión:</strong>
                <input type="text" id="in-ac-reg" placeholder="Matrícula (Ej: CC-BGG)" style="max-width: 150px;">
                <input type="text" id="in-ac-wo" placeholder="WO (Ej: T00Y3MGQ)" style="max-width: 150px;">
                <input type="text" id="in-ac-info" placeholder="Info Gantt/Vuelo/Pos (Ej: gantt 8:30-19:00 / VUELO 21:00 / pos 2)">
                <button class="btn-accent" onclick="addAvion()">+ Agregar Avión</button>
            </div>

            <div class="control-group">
                <strong>Tarea:</strong>
                <select id="sel-avion" style="max-width: 150px;">
                    <option value="">Seleccione Avión...</option>
                </select>
                <input type="text" id="in-task-desc" placeholder="Descripción de la tarea">
                <input type="text" id="in-task-wo" placeholder="Código Tarea (Ej: [T00Y2LG5])" style="max-width: 180px;">
                <input type="text" id="in-task-techs" placeholder="Técnicos (Ej: B.MOLINA/S.GAMBOA)">
                <button class="btn-accent" onclick="addTask()">+ Agregar Tarea</button>
            </div>

            <div class="control-group" style="justify-content: flex-end;">
                <button onclick="window.print()" style="background-color: #718096;">🖨️ Imprimir / Guardar PDF</button>
            </div>
        </div>

        <div id="document-area">
            <div class="document-header" id="display-header">
                TURNO TARDE MIÉRCOLES 13 DE MAYO DEL 2026
            </div>
            
            <div id="aviones-container">
                </div>
        </div>
    </div>

    <script>
        // Estado de la aplicación
        let avionesData = [];

        // Inicializar fecha de hoy
        document.getElementById('in-fecha').valueAsDate = new Date();
        updateHeader();

        function formatearFecha(fechaStr) {
            if (!fechaStr) return '';
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const fecha = new Date(fechaStr + 'T00:00:00'); // Evitar desfase de zona horaria
            return fecha.toLocaleDateString('es-ES', opciones);
        }

        function updateHeader() {
            const turno = document.getElementById('in-turno').value;
            const fecha = document.getElementById('in-fecha').value;
            const jefe = document.getElementById('in-jefe').value;
            
            let textoHeader = `${turno} ${formatearFecha(fecha)}`;
            if (jefe) textoHeader += ` - JEFE DE TURNO: ${jefe}`;
            
            document.getElementById('display-header').innerText = textoHeader.toUpperCase();
        }

        function addAvion() {
            const reg = document.getElementById('in-ac-reg').value.trim();
            const wo = document.getElementById('in-ac-wo').value.trim();
            const info = document.getElementById('in-ac-info').value.trim();

            if (!reg) {
                alert("Por favor, ingrese al menos la matrícula del avión.");
                return;
            }

            const newAvion = {
                id: Date.now().toString(),
                reg: reg.toUpperCase(),
                wo: wo ? `(${wo.toUpperCase()})` : '',
                info: info,
                tareas: []
            };

            avionesData.push(newAvion);
            
            // Limpiar inputs
            document.getElementById('in-ac-reg').value = '';
            document.getElementById('in-ac-wo').value = '';
            document.getElementById('in-ac-info').value = '';

            render();
        }

        function addTask() {
            const avionId = document.getElementById('sel-avion').value;
            const desc = document.getElementById('in-task-desc').value.trim();
            const wo = document.getElementById('in-task-wo').value.trim();
            const techs = document.getElementById('in-task-techs').value.trim();

            if (!avionId) {
                alert("Seleccione un avión de la lista primero.");
                return;
            }
            if (!desc) {
                alert("Ingrese la descripción de la tarea.");
                return;
            }

            const avion = avionesData.find(a => a.id === avionId);
            if (avion) {
                avion.tareas.push({
                    id: Date.now().toString(),
                    desc: desc.toUpperCase(),
                    wo: wo ? `${wo.toUpperCase()}` : '',
                    techs: techs.toUpperCase(),
                    completada: false
                });

                // Limpiar inputs
                document.getElementById('in-task-desc').value = '';
                document.getElementById('in-task-wo').value = '';
                document.getElementById('in-task-techs').value = '';
                
                // Devolver el foco a la descripción por si se quieren cargar varias seguidas
                document.getElementById('in-task-desc').focus();

                render();
            }
        }

        function toggleTask(avionId, taskId) {
            const avion = avionesData.find(a => a.id === avionId);
            const tarea = avion.tareas.find(t => t.id === taskId);
            tarea.completada = !tarea.completada;
            // No hacemos re-render para no perder el foco si están haciendo click rápido, 
            // el checkbox se actualiza solo visualmente por el estado del DOM.
        }

        function deleteAvion(avionId) {
            if(confirm("¿Eliminar este avión y todas sus tareas?")) {
                avionesData = avionesData.filter(a => a.id !== avionId);
                render();
            }
        }

        function deleteTask(avionId, taskId) {
            const avion = avionesData.find(a => a.id === avionId);
            avion.tareas = avion.tareas.filter(t => t.id !== taskId);
            render();
        }

        function render() {
            const container = document.getElementById('aviones-container');
            const select = document.getElementById('sel-avion');
            
            container.innerHTML = '';
            select.innerHTML = '<option value="">Seleccione Avión...</option>';

            avionesData.forEach(avion => {
                // Actualizar Dropdown
                const option = document.createElement('option');
                option.value = avion.id;
                option.textContent = avion.reg;
                select.appendChild(option);

                // Construir UI del Avión
                const section = document.createElement('div');
                section.className = 'avion-section';
                
                const formatTitle = `• ${avion.reg} ${avion.wo} ${avion.info}`.trim();

                let html = `
                    <div class="avion-title">
                        <span>${formatTitle}</span>
                        <button class="delete-btn no-print" onclick="deleteAvion('${avion.id}')">X</button>
                    </div>
                    <ul class="task-list">
                `;

                avion.tareas.forEach(tarea => {
                    const checkedHtml = tarea.completada ? 'checked' : '';
                    html += `
                        <li class="task-item">
                            <div class="task-checkbox-container">
                                <input type="checkbox" class="task-checkbox no-print" 
                                       onchange="toggleTask('${avion.id}', '${tarea.id}')" ${checkedHtml}>
                                <span class="task-checkbox" style="display: none;"></span> </div>
                            <div class="task-content">
                                <div class="task-desc">
                                    - ${tarea.desc} ${tarea.wo}
                                    <button class="delete-btn no-print" onclick="deleteTask('${avion.id}', '${tarea.id}')">X</button>
                                </div>
                                ${tarea.techs ? `<div class="task-assignees">${tarea.techs}</div>` : ''}
                            </div>
                        </li>
                    `;
                });

                html += `</ul>`;
                section.innerHTML = html;
                container.appendChild(section);
            });
        }
    </script>
</body>
</html>
